spring:
  application:
    name: g_67_shop # Имя приложения (для логов и сервисов)
  datasource: # настройки подключения к базе данных
    driver-class-name: org.postgresql.Driver # Используем драйвер PostgreSQL
    # Формат: [протокол]:[тип_бд]://[хост]:[порт]/[имя_базы]
    url: jdbc:postgresql://localhost:5432/g_67_shop
    #      |      |          |        |       |
    #      |      |          |        |       └── Название базы данных
    #      |      |          |        └──────── Порт (у Postgres по умолчанию 5432)
    #      |      |          └───────────────── Адрес сервера (localhost — твой ПК)
    #      |      └──────────────────────────── Тип СУБД (PostgreSQL)
    #      └─────────────────────────────────── Технология соединения в Java (JDBC)
    username: postgres
    password: ${DB_PASSWORD}
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    # /db/changelog/ — идем по этим папкам
    # db.changelog-master.xml — главный файл, который управляет всеми остальными
#  Вот этот файлик application.yaml является главным конфигурационным файлом нашего приложения.
#  Здесь мы прописываем в том числе подключение для базы данных.

#  Если бы мы с вами выбрали другой формат настроек, то это бы прописывалось вот таким вот образом.
#  Вот если бы мы с вами выбрали формат файла настроек properties, то настройки бы выглядели вот так.
#  Каждая настройка прописывалась бы полным путем. spring.application.name=g_67_shop
server:
  port: 8081

logging:
  file:
    name: logs/log.log
  level:
    root: info
    de:
      ait:
        g_67_shop: debug

messages:
  greeting: Hello from local application!